# Per-directory rewrite rules for /api/
#
# This file lives in wwwroot/api/ and applies only to URLs under /api/.
# It is evaluated before the global wwwroot/rewrite.conf, so these rules
# take priority for any /api/* request.
#
# Pattern: clean URL → versioned JSON file
# ---------------------------------------------------------------------------
# These rules make the .json extension optional, so clients can request
# /api/v1/users instead of /api/v1/users.json and receive the same response.
# The browser address bar (or API client URL) stays at the clean path —
# no redirect occurs.
#
# This is the "stable public path" pattern: publish /api/v1/users now,
# and later replace the JSON file with a real backend proxy or a v2 endpoint
# without changing any client code.

rewrite /api/v1/users    /api/v1/users.json
rewrite /api/v1/products /api/v1/products.json
rewrite /api/v1/status   /api/v1/status.json
