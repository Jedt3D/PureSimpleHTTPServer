# Per-directory rewrite rules for /blog/
#
# This file lives in wwwroot/blog/ and applies only to URLs under /blog/.
# It is evaluated before the global wwwroot/rewrite.conf, so these rules
# take priority for any /blog/* request.
#
# Rule: serve the HTML file for a blog slug without the /posts/ prefix.
# Example:
#   Request:  GET /blog/hello-world
#   Served:   wwwroot/blog/posts/hello-world.html
#   Browser sees: /blog/hello-world  (no redirect, address bar unchanged)
#
# The * wildcard captures one path segment. The captured value is substituted
# as {path} in the target. Adding --clean-urls on the command line handles
# the trivial /about -> about.html case without any rules here.
#
# ⚠️ CRITICAL: Rewrite rules are evaluated BEFORE index file lookup.
# If the wildcard rule /blog/* came first, it would catch the /blog/ request
# and try to serve /blog/posts/.html (which doesn't exist), causing a 404.
# See docs/URL_REWRITE.md for full explanation.
#
# IMPORTANT: Explicit rules must come BEFORE the catch-all wildcard.
# Rules are evaluated in order; first match wins.

# Serve blog index page explicitly (before catch-all)
rewrite /blog/ /blog/index.html
rewrite /blog/index.html /blog/index.html

# Rewrite blog post slugs to the posts/ directory
rewrite /blog/* /blog/posts/{path}.html
