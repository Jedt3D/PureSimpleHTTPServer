# Global rewrite rules — PureSimpleHTTPServer v1.5.0
# Demonstrates all supported pattern types.
#
# Syntax:
#   rewrite <pattern> <target>
#   redir   <pattern> <target> [code]
#
# Pattern types:
#   /exact          — matches only this exact path
#   /prefix/*       — glob: * captures everything after prefix
#   ~/regex/        — POSIX regex: leading ~ marks regex pattern
#
# Glob capture variables: {path}, {dir}, {file}
# Regex capture variables: {re.1}, {re.2}, …

# ── Exact rewrites ──────────────────────────────────────────────
# Serve /about.html when the browser requests the clean URL /about
rewrite /about /about.html

# ── Glob rewrites ───────────────────────────────────────────────
# /blog/hello-world  →  /blog/posts/hello-world.html
rewrite /blog/* /blog/posts/{path}.html

# /static/img/logo.png  →  /assets/img/logo.png
rewrite /static/* /assets/{dir}/{file}

# ── Exact redirects ─────────────────────────────────────────────
# Permanent redirect from the old home URL to /
redir /old-home / 301

# ── Glob redirects ──────────────────────────────────────────────
# /downloads/server.zip  →  /assets/server.zip  (301)
redir /downloads/* /assets/{path} 301

# ── Regex rewrite ────────────────────────────────────────────────
# /user/42  →  /api/v1/users/42  (leading ~ marks regex pattern)
rewrite ~/user/([0-9]+) /api/v1/users/{re.1}

# ── Regex redirect ───────────────────────────────────────────────
# /feed        →  /api/v1/feed        (301)
# /feed.atom   →  /api/v1/feed.atom   (301)
redir ~/feed(.*) /api/v1/feed{re.1} 301
