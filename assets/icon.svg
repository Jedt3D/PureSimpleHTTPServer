  <circle cx="256" cy="256" r="240" fill="#2563eb" />

  <!-- Server rack icon -->
  <rect x="120" y="140" width="272" height="48" rx="8" fill="#ffffff" opacity="0.9"/>
  <rect x="120" y="208" width="272" height="48" rx="8" fill="#ffffff" opacity="0.9"/>
  <rect x="120" y="276" width="272" height="48" rx="8" fill="#ffffff" opacity="0.9"/>

  <!-- Status lights -->
  <circle cx="144" cy="164" r="8" fill="#22c55e"/>
