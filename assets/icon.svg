  <circle cx="192" cy="164" r="8" fill="#22c55e"/>

  <circle cx="144" cy="232" r="8" fill="#22c55e"/>
  <circle cx="168" cy="232" r="8" fill="#22c55e"/>
  <circle cx="192" cy="232" r="8" fill="#22c55e"/>

